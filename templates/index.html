<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clinic Queue</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container" id="clinic-queue-container">
  <h1 class="title" id="page-title">Clinic Waiting List</h1>

  <a href="/add" id="register-link" class="link">Register Patient</a>
  <br /><br />

  <h3 class="subtitle">Patients Waiting:</h3>

  <ul id="patient-list" class="patient-list">
    {% for patient in queue %}
      <li class="patient-item">{{ patient.display() }}</li>
    {% endfor %}
  </ul>

  <h3 class="subtitle">Total Patients Seen Today: {{ total_seen }}</h3>

  <a href="/next" id="next-patient-link" class="btn">Call Next Patient</a>
</div>

</body>
</html>
